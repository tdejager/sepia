[workspace]
preview = ["pixi-build"]
channels = ["https://prefix.dev/conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[dependencies]
sepia = { path = "." }
ffmpeg = "*"
# conda-forge ffmpeg links libjxl.0.11 but only declares `libjxl >=0.11,<1.0a0`,
# so an unpinned solve installs the ABI-incompatible 0.12 and ffmpeg fails to
# load. Drop this pin once conda-forge rebuilds ffmpeg against libjxl 0.12.
libjxl = "0.11.*"
agent-browser = "*"

[tasks]
build = "cargo build"
test = "cargo test"
fmt = "cargo fmt --check"
clippy = "cargo clippy --all-targets -- -D warnings"
check = { depends-on = ["fmt", "clippy", "test"] }
sepia = "cargo run --"
run-hacker-news = "sepia run examples/hacker-news-browse.toml"
run-wikipedia = "sepia run examples/wikipedia-search.toml"
run-crates-io = "sepia run examples/crates-io-search.toml"
run-marginalia = "sepia run examples/marginalia-search.toml"
inspect = "sepia inspect"
package-local = "pixi publish --target-dir dist/conda"

[package]
name = "sepia"
version = "0.3.0"

[package.build.backend]
name = "pixi-build-rust"
version = "0.*"
channels = ["https://prefix.dev/conda-forge"]

[package.run-dependencies]
ffmpeg = "*"
# Same libjxl ABI guard as above; remove when conda-forge ffmpeg is rebuilt.
libjxl = "0.11.*"
agent-browser = "*"
