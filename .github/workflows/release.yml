name: Release

on:
  push:
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Required for prefix.dev trusted publishing via OIDC

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ matrix.target-platform }} to prefix.dev/tim
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target-platform: linux-64
            runner: ubuntu-latest
          - target-platform: osx-arm64
            runner: macos-latest
          - target-platform: win-64
            runner: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.71.0
          cache: true

      - name: Verify locked environment
        run: pixi install --locked

      - name: Run checks
        if: matrix.target-platform == 'linux-64'
        run: pixi run check

      - name: Publish package to prefix.dev/tim
        run: pixi publish --target-platform ${{ matrix.target-platform }} --build-dir .pixi/publish-bld-${{ matrix.target-platform }} --target-channel https://prefix.dev/tim --generate-attestation --clean
