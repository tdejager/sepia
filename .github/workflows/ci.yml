name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pixi:
    name: Pixi check and package build (${{ matrix.target-platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target-platform: linux-64
            runner: ubuntu-latest
          - target-platform: osx-arm64
            runner: macos-latest
          - target-platform: win-64
            runner: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.71.0
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: Verify locked environment
        run: pixi install --locked

      - name: Run checks
        if: matrix.target-platform == 'linux-64'
        run: pixi run check

      - name: Build package without publishing
        run: pixi publish --target-platform ${{ matrix.target-platform }} --target-dir dist/conda

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: conda-package-${{ matrix.target-platform }}
          path: dist/conda/*
          if-no-files-found: error
