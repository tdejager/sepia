#:schema ../schemas/sepia-script.schema.json

# A ready-to-run Sepia demo against a public website — no login required.
# Try it with:
#
#   sepia run examples/hacker-news-browse.toml
#   sepia inspect
#
# It opens the Hacker News front page (a numbered, ranked list), scrolls the
# stories, highlights result #5, and clicks through to open it.

name = "Hacker News browse"
description = "Browse the Hacker News front page, scroll the ranked list, and open a numbered result"
url = "https://news.ycombinator.com"
session = "sepia-hn-demo"

[capture]
output_fps = 24
default_hold_ms = 700
default_action_ms = 400

[[steps]]
name = "Front page loads"
wait_ms = 1200
hold_ms = 1400
screenshot = true

[[steps]]
name = "Scroll the ranked stories"
# Hacker News renders in quirks mode, so the scrolling element is <body>.
scroll = { selector = "body", pixels = 500 }
duration_ms = 1600
frames = 32
hold_ms = 900
screenshot = true

[[steps]]
name = "Highlight result #15"
eval = "const a = document.querySelectorAll('.titleline > a')[14]; a.scrollIntoView({ block: 'center' }); a.style.outline = '3px solid #d65d0e'; a.style.background = '#ffe8ad';"
hold_ms = 1400
screenshot = true

[[steps]]
name = "Open the numbered result"
# `index` clicks the 15th match (0-based) — and shows Sepia's click ripple.
click = { selector = ".titleline > a", index = 14 }
duration_ms = 2200
hold_ms = 1600
screenshot = true
